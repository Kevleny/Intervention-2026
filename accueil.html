<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>TechLab — IMP360</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f2439 0%, #1a3a5c 40%, #2563a8 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 8px;
        }
        .title {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .subtitle {
            font-size: 0.82rem;
            opacity: 0.55;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        .cards {
            display: flex;
            gap: 16px;
            width: 100%;
            max-width: 520px;
        }

        .card {
            flex: 1;
            background: rgba(255,255,255,0.08);
            border: 1.5px solid rgba(255,255,255,0.12);
            border-radius: 18px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s;
            text-decoration: none;
            color: white;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .card:hover, .card:active {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.3);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
        }

        .card-icon {
            font-size: 2.4rem;
            margin-bottom: 14px;
        }
        .card-title {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .card-desc {
            font-size: 0.75rem;
            opacity: 0.5;
            line-height: 1.4;
        }

        .footer {
            position: fixed;
            bottom: 20px;
            font-size: 0.7rem;
            opacity: 0.3;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="logo">⬡</div>
    <div class="title">TechLab</div>
    <div class="subtitle">By Kévin RICHER</div>

    <div class="cards">
        <a class="card" href="rapport.html">
            <div class="card-icon">📝</div>
            <div class="card-title">Rapport d'intervention</div>
            <div class="card-desc">Créer et consulter les comptes-rendus</div>
        </a>
        <a class="card" href="index.html">
            <div class="card-icon">📊</div>
            <div class="card-title">Dashboard</div>
            <div class="card-desc">Suivi des interventions en temps réel</div>
        </a>
    </div>

    <div class="footer">© 2026 TechLab — Kévin RICHER / Base de données @SupaBase</div>

</body>
</html>
